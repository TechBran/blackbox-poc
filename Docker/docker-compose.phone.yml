# AI BlackBox Phone Integration - Docker Compose
# Drachtio (SIP signaling) + FreeSwitch (Media handling)
#
# Usage:
#   docker-compose -f docker-compose.phone.yml up -d
#
# Environment variables (set in .env or export):
#   DRACHTIO_SECRET - Drachtio authentication secret (default: cymru)
#   ESL_PASSWORD - FreeSwitch ESL password (default: ClueCon)
#   HOST_IP - Host IP for SIP/RTP binding (default: auto-detect)

version: '3.8'

services:
  # =========================================================================
  # Drachtio - SIP Signaling Server
  # =========================================================================
  drachtio:
    image: drachtio/drachtio-server:latest
    container_name: blackbox-drachtio
    hostname: drachtio
    ports:
      # SIP UDP/TCP (for 3CX and external SIP)
      - "5060:5060/udp"
      - "5060:5060/tcp"
      # Drachtio admin port (for our app connection)
      - "9022:9022"
    environment:
      - DRACHTIO_SECRET=${DRACHTIO_SECRET:-cymru}
      - DRACHTIO_LOGLEVEL=info
      # External IP for SIP signaling (set to your host IP)
      - DRACHTIO_EXTERNAL_IP=${HOST_IP:-}
    volumes:
      - ./drachtio/config/drachtio.conf.xml:/etc/drachtio.conf.xml:ro
    networks:
      - phone_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9022"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # FreeSwitch - Media Server
  # =========================================================================
  freeswitch:
    image: safarov/freeswitch:1.10.11
    container_name: blackbox-freeswitch
    hostname: freeswitch
    ports:
      # SIP (internal, for Drachtio bridge)
      - "5080:5080/udp"
      - "5080:5080/tcp"
      # ESL (Event Socket Library - for our app)
      - "8021:8021"
      # RTP media ports (UDP)
      - "16384-32768:16384-32768/udp"
    environment:
      - ESL_PASSWORD=${ESL_PASSWORD:-ClueCon}
      # External IP for RTP (set to your host IP)
      - EXTERNAL_RTP_IP=${HOST_IP:-}
      - DEFAULT_VOICE_RATE=8000
    volumes:
      - ./freeswitch/config/freeswitch.xml:/etc/freeswitch/freeswitch.xml:ro
      - ./freeswitch/config/dialplan/default.xml:/etc/freeswitch/dialplan/default.xml:ro
      # Audio files directory (for IVR prompts)
      - ../Portal/uploads:/mnt/uploads:ro
    networks:
      - phone_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  phone_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
