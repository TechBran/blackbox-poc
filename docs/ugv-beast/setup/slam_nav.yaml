controller_server:
  ros__parameters:
    use_sim_time: false
    # 20 Hz controller spec. With /odom at 30 Hz from BNO085-driven EKF,
    # the controller has fresh feedback every ~33ms; 20 Hz controller period
    # of 50ms keeps the loop tight without wasting CPU. Bumped 2026-05-04.
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: progress_checker
    goal_checker_plugin: goal_checker
    controller_plugins:
    - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.15
      movement_time_allowance: 30.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      # Tightened 2026-05-04 after BNO085 URDF tilt fix gave us trustworthy yaw.
      # xy 0.35→0.15 (~14in→~6in): robot will actually reach the goal point.
      # yaw 3.14→0.2 (~180°→~11°): robot will face the commanded heading. Was
      # set to 3.14 (any direction acceptable) when yaw was untrustworthy.
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.35
      stateful: true
    # CPU-relief tuning 2026-05-05: cut DWB samples 20x20→10x10 (4x cheaper trajectory
    # search), sim_time 2.0→1.5 (25% shorter rollout), local_costmap update 10→5 Hz
    # (halves layer compute). Combined ~55% CPU reduction in nav2_container; tested
    # under load avg 7.67 with controller_server lifecycle queries timing out.
    FollowPath:
      plugin: nav2_rotation_shim_controller::RotationShimController
      primary_controller: dwb_core::DWBLocalPlanner
      angular_dist_threshold: 0.35
      forward_sampling_distance: 0.3
      rotate_to_heading_angular_vel: 2.0
      rotate_to_goal_heading: true
      max_angular_accel: 3.2
      simulate_ahead_time: 1.0
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.15
      max_vel_y: 0.0
      max_vel_theta: 2.0
      min_speed_xy: 0.0
      max_speed_xy: 0.15
      min_speed_theta: 0.0
      acc_lim_x: 1.2
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -1.2
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 10
      vy_samples: 5
      vtheta_samples: 10
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.3
      # Match goal_checker.xy_goal_tolerance — DWB uses this for its own
      # at-goal check, must agree with the SimpleGoalChecker above.
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
      - Oscillation
      - BaseObstacle
      - GoalAlign
      - PathAlign
      - PathDist
      - GoalDist
      BaseObstacle.scale: 0.1
      PathAlign.scale: 4.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 0.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      transform_tolerance: 0.3
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      # UGV Beast chassis is 11" (x) x 8" (y) = 27.9 cm x 20.3 cm.
      # Rectangle centered at base_footprint. Replaces robot_radius so
      # footprint_clearing_enabled properly clears self-reflections
      # (antennas/hanging hardware) within the real chassis outline.
      footprint: "[[0.140, 0.102], [-0.140, 0.102], [-0.140, -0.102], [0.140, -0.102]]"
      plugins:
      - obstacle_layer
      - inflation_layer
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        # Inflation tuned 2026-05-05 evening, pass 4 (final): 0.22m radius +
        # gentle falloff 5.0 = robot center stays ≥22cm from wall (edge ≥12cm = ~5"),
        # matching operator comfort zone. Pass 3 (0.15/8.0) was too loose — robot
        # hugged walls and hit lethal cells. Standard practice for small tracked
        # robots: inflation ≈ 2× inscribed_radius (here 0.10m).
        cost_scaling_factor: 5.0
        inflation_radius: 0.22
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          expected_update_rate: 0.5  # 500ms — /scan publishes at 10Hz so 5x headroom
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      always_send_full_costmap: true
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 3.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      transform_tolerance: 0.3
      # Same 11" x 8" footprint as local_costmap. See note above.
      footprint: "[[0.140, 0.102], [-0.140, 0.102], [-0.140, -0.102], [0.140, -0.102]]"
      resolution: 0.05
      track_unknown_space: false
      plugins:
      - static_layer
      - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          expected_update_rate: 0.5  # 500ms — /scan publishes at 10Hz so 5x headroom
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        # Inflation tuned 2026-05-05 evening, pass 4 (final): 0.22m radius +
        # gentle falloff 5.0 = robot center stays ≥22cm from wall (edge ≥12cm = ~5"),
        # matching operator comfort zone. Pass 3 (0.15/8.0) was too loose — robot
        # hugged walls and hit lethal cells. Standard practice for small tracked
        # robots: inflation ≈ 2× inscribed_radius (here 0.10m).
        cost_scaling_factor: 5.0
        inflation_radius: 0.22
      always_send_full_costmap: true
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: false
    planner_plugins:
    - GridBased
    GridBased:
      # SmacPlannerHybrid — Hybrid A* with motion primitives, FULL polygon
      # footprint collision check at every search node. Replaced SmacPlanner2D
      # 2026-05-05 evening because the 2D planner's circular inscribed-radius
      # collision approximation didn't catch orientation-dependent corner clips
      # for the 11"×8" rectangular footprint in tight basement passages.
      plugin: nav2_smac_planner/SmacPlannerHybrid
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      # Motion model — REEDS_SHEPP allows reverse, important for tracked-robot
      # 3-point turns in tight spaces. Reverse is safe with omnidirectional
      # LiDAR (LD19 360°) coverage; DWB does full polygon collision on every
      # rolled-out trajectory regardless of direction.
      motion_model_for_search: "REEDS_SHEPP"
      # 72 bins = 5° angle resolution. Higher = more accurate but more compute.
      angle_quantization_bins: 72
      # Tracked robot can pivot in place; minimum_turning_radius technically 0,
      # but Hybrid A* needs a small positive value for motion primitive
      # generation. 0.10m gives very tight curves matching the robot's
      # actual capability.
      minimum_turning_radius: 0.10
      # Penalties shape path quality:
      # - reverse_penalty: discourage but allow reverse maneuvers
      # - change_penalty: discourage frequent direction switches
      # - non_straight_penalty: prefer straight segments over curves
      # - cost_penalty: penalize high-cost (inflation) cells more aggressively
      reverse_penalty: 5.0
      change_penalty: 1.0
      non_straight_penalty: 1.20
      cost_penalty: 2.0
      # carries forward from SmacPlanner2D — strong free-space preference
      retrospective_penalty: 0.025
      # Heuristic caching: false = compute on demand (less memory, more CPU);
      # true = precompute all heuristic values (more memory, less CPU per plan).
      # Start false; flip to true if planning latency becomes an issue.
      cache_obstacle_heuristic: false
      # Analytic expansion: try direct curve from current node to goal at every
      # `analytic_expansion_ratio`-th iteration. Speeds up convergence in clear
      # space. analytic_expansion_max_length caps how far this curve can be.
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      use_quadratic_cost_penalty: false
      use_final_approach_orientation: false
      # Lookup table for motion primitive expansion. Larger = faster but more
      # memory. 20.0m covers any reasonable basement plan distance.
      lookup_table_size: 20.0
      # Smoother — same params as before
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins:
    - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true
